<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Facebook – Log in or Sign Up</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container-fluid login-page">
    <div class="row align-items-center min-vh-100">

        <!-- LEFT SECTION -->
        <div class="col-md-6 text-center text-md-start px-5 mb-5 mb-md-0">
            <h1 class="fb-logo">facebook</h1>
            <p class="fb-tagline">
                Facebook helps you connect and share<br>
                with the people in your life.
            </p>
        </div>

        <!-- RIGHT SECTION -->
        <div class="col-md-6 d-flex flex-column align-items-center">

            <!-- LOGIN CARD -->
            <div class="login-card">
                <form>

                    <div class="mb-3">
                        <input type="text"
                               class="form-control form-control-lg"
                               placeholder="Email address or phone number">
                    </div>

                    <div class="mb-3">
                        <input type="password"
                               class="form-control form-control-lg"
                               placeholder="Password">
                    </div>

                    <button type="submit"
                            class="btn btn-primary btn-lg w-100 login-btn">
                        Log In
                    </button>

                    <div class="text-center mt-3">
                        <a href="#" class="forgot-link">Forgotten password?</a>
                    </div>

                    <hr>

                    <div class="text-center">
                        <button type="button"
                                class="btn btn-success btn-lg create-btn">
                            Create New Account
                        </button>
                    </div>

                </form>
            </div>

            <!-- CREATE PAGE TEXT -->
            <div class="create-page-text text-center mt-4">
                <a href="#">Create a Page</a> for a celebrity, brand or business.
            </div>

        </div>
    </div>
</div>

</body>
</html>
