<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Facebook – Log in</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container-fluid login-wrapper">
    <div class="row min-vh-100">

        <!-- LEFT VISUAL AREA -->
        <div class="col-md-6 d-none d-md-flex align-items-center justify-content-center left-visual">

            <div class="visual-stack">
                <img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e" class="visual-card card-main">
                <img src="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d" class="visual-card card-top">
                <img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2" class="visual-card card-bottom">
            </div>

            <div class="left-text">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/51/Facebook_f_logo_%282019%29.svg"
                     class="fb-logo-large mb-4">

                <h1>
                    Explore the things<br>
                    <span>you love.</span>
                </h1>
            </div>

        </div>

        <!-- RIGHT LOGIN -->
        <div class="col-md-6 d-flex align-items-center justify-content-center">
            <div class="login-card">

                <h5 class="mb-4">Log in to Facebook</h5>

                <input type="text" class="form-control mb-3"
                       placeholder="Email address or mobile number">

                <input type="password" class="form-control mb-3"
                       placeholder="Password">

                <button class="btn btn-primary w-100 login-btn">
                    Log in
                </button>

                <div class="text-center mt-3">
                    <a href="#" class="forgot-link">Forgotten password?</a>
                </div>

                <div class="divider"></div>

                <button class="btn create-btn w-100">
                    Create new account
                </button>

                <div class="meta text-center mt-4">
                    Meta
                </div>

            </div>
        </div>

    </div>
</div>

</body>
</html>
